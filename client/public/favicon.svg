<?xml version="1.0" encoding="UTF-8"?>
<!-- FlowMap favicon — simplified order-flow heatmap mark, tuned to read at 16-32px. -->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fvFocal" x1="5" y1="0" x2="27" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1fb6a6"/>
      <stop offset="1" stop-color="#37d0c0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#070a10"/>
  <g>
    <!-- quiet upper band -->
    <rect x="5" y="8.3" width="22" height="1.8" rx="0.7" fill="#1fb6a6" opacity="0.38"/>
    <!-- upper liquidity wall -->
    <rect x="5" y="11.8" width="22" height="1.6" rx="0.7" fill="#37d0c0" opacity="0.92"/>
    <!-- red sell tick -->
    <rect x="21" y="13.7" width="6" height="1.3" rx="0.5" fill="#d3524f" opacity="0.95"/>
    <!-- focal liquidity wall (centre, brightest) -->
    <rect x="5" y="15" width="22" height="2" rx="0.8" fill="url(#fvFocal)"/>
    <!-- amber accent band -->
    <rect x="5" y="18.5" width="22" height="1.8" rx="0.7" fill="#d6a13a" opacity="0.62"/>
    <!-- quiet lower band -->
    <rect x="5" y="21.9" width="22" height="1.8" rx="0.7" fill="#1fb6a6" opacity="0.36"/>
  </g>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.6" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
</svg>
