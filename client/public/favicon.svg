<?xml version="1.0" encoding="UTF-8"?>
<!-- FlowMap favicon — simplified volume-profile mark, tuned to read at 16-32px. -->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fvPOC" x1="6" y1="0" x2="27" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1fb6a6"/>
      <stop offset="1" stop-color="#37d0c0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#070a10"/>
  <!-- volume-profile silhouette: baseline x=6, POC longest & centred -->
  <g>
    <rect x="6" y="4.6"  width="6.3"  height="1.8" rx="0.6" fill="#1fb6a6" opacity="0.48"/>
    <rect x="6" y="7.4"  width="4"    height="1.5" rx="0.5" fill="#d3524f" opacity="0.92"/><!-- red ask tick -->
    <rect x="6" y="9.9"  width="12.2" height="1.8" rx="0.6" fill="#1fb6a6" opacity="0.60"/>
    <rect x="6" y="12.5" width="16.4" height="1.8" rx="0.6" fill="#37d0c0" opacity="0.90"/><!-- bright node -->
    <rect x="6" y="15"   width="21"   height="2"   rx="0.7" fill="url(#fvPOC)"/><!-- POC (focal) -->
    <rect x="6" y="17.7" width="17.2" height="1.8" rx="0.6" fill="#1fb6a6" opacity="0.72"/>
    <rect x="6" y="20.3" width="12.6" height="1.8" rx="0.6" fill="#d6a13a" opacity="0.70"/><!-- amber channel -->
    <rect x="6" y="23"   width="9.7"  height="1.8" rx="0.6" fill="#1fb6a6" opacity="0.56"/>
    <rect x="6" y="25.6" width="6.3"  height="1.8" rx="0.6" fill="#1fb6a6" opacity="0.46"/>
  </g>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.6" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
</svg>
